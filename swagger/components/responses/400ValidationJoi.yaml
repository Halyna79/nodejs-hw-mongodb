description: Invalid body data
content:
  application/json:
    schema:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: BadRequestError
        data:
          type: object
          required:
            - message
            - errors
          properties:
            message:
              type: string
              example: Bad request
            errors:
              type: array
              items:
                type: object
                required:
                  - message
                  - path
                  - type
                properties:
                  message:
                    type: string
                    example: \"name\" is required
                  path:
                    type: array
                    items:
                      type: string
                      example: 'name'
                  type:
                    type: string
                    example: any.required
                  context:
                    type: object
                    additionalProperties: true