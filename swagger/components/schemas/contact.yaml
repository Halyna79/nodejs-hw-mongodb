type: object
required:
  - _id
  - name
  - phoneNumber
  - contactType
  - userId
properties:
  _id:
    description: "Contact's id"
    type: string
    example: 6876b478084fefc35976f7b0
  name:
    description: "Contact's name"
    type: string
    example: 'Halyna'
  phoneNumber:
    description: "Contact's phone number"
    type: string
    example: '+380991234567'
  email:
    description: "Contact's email"
    type: string
    example: 'halyna@example.com'
  isFavourite:
    description: "Contact's is favourite"
    type: boolean
    example: true
  contactType:
    description: "Contact's contact type"
    type: string
    enum: ['work', 'home', 'personal']
  userId:
    description: "Contact's user id"
    type: string
    example: 6876b3ff084fefc35976f7a8
  photo:
    description: "Link to contact's photo"
    type: string
    example: https://res.cloudinary.com/dyuf9mnwr/image/upload/v1752609912/ixlpz2qfe2y3jpovcqad.png