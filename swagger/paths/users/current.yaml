tags:
  - Users
summary: Get current user
operationId: getCurrentUser
description: Return info about the currently logged in user
security:
  - bearerAuth: []
responses:
  '200':
    description: Info about current user
    content:
      application/json:
        schema:
          type: object
          properties:
            email:
              type: string
              example: halyna@example.com
            subscription:
              type: string
              example: pro
  '401':
    $ref: ../../components/responses/401.yaml