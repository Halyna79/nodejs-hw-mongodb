tags:
  - Users
summary: Register user
operationId: registerUser
description: Create a new user account
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - email
          - password
        properties:
          email:
            type: string
            example: halyna@example.com
          password:
            type: string
            example: secret123
responses:
  '201':
    description: User created successfully
    content:
      application/json:
        schema:
          type: object
          properties:
            email:
              type: string
              example: halyna@example.com
            subscription:
              type: string
              example: starter
  '409':
    description: Email in use
  '400':
    $ref: ../../components/responses/400.yaml