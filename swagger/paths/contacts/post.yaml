tags:
  - Contacts
summary: Create contact
operationId: addContact
description: 'Create new contact for the authorized user'
security:
  - bearerAuth: []
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        required:
          - name
          - phoneNumber
          - contactType
        properties:
          name:
            description: "Contact's name"
            type: string
            example: 'Halyna'
          phoneNumber:
            description: "Contact's phoneNumber"
            type: string
            example: "+380991234567"
          email:
            description: "Contact's email"
            type: string
            example: halyna@example.com
          isFavourite:
            description: "Contact's is favourite"
            type: boolean
            example: true
          contactType:
            description: "Contact's contact type"
            type: string
            enum: ['work', 'home', 'personal']
          photo:
            description: "Link to contact's photo"
            type: string
            format: binary
responses:
  '201':
    description: Contact successfully created
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: Successfully created a contact!
            data:
              type: object
              $ref: '../../components/schemas/contact.yaml'
  '401':
  $ref: '../../components/responses/404.yaml'