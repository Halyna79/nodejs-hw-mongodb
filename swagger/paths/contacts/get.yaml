tags:
  - Contacts
summary: Get all contacts
operationId: getAllContacts
description: Get all contacts
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      example: 1
  - in: query
    name: perPage
    schema:
      type: integer
      example: 15
  - in: query
    name: sortBy
    description: Any contact field is valid
    schema:
      type: string
      example: name
  - in: query
    name: sortOrder
    schema:
      type: string
      example: asc
      enum:
        - asc
        - desc
  - in: query
    name: type
    schema:
      type: string
      example: personal
      enum:
        - home
        - work
        - personal
  - in: query
    name: isFavourite
    schema:
      type: string
      example: false
      enum:
        - 'true'
        - 'false'
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contact with id 65ca67e7ae7f10c88b598384
            data:
              type: object
              required:
                - data
                - page
                - perPage
                - totalItems
                - totalPages
                - hasNextPage
                - hasPreviousPage
              properties:
                data:
                  type: array
                  items:
                    $ref: ../../components/schemas/contact.yaml
                page:
                  type: integer
                  example: 1
                perPage:
                  type: integer
                  example: 15
                totalItems:
                  type: integer
                  example: 98
                totalPages:
                  type: integer
                  example: 8
                hasNextPage:
                  type: boolean
                  example: true
                hasPreviousPage:
                  type: boolean
                  example: true
  '401':
    $ref: ../../components/responses/401.yaml