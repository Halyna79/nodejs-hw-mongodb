tags:
  - Contacts
summary: Update contact
operationId: updateStatus
description: Update contact
security:
  - bearerAuth: []
parameters:
  - in: path
    name: contactId
    required: true
    schema:
      type: string
      example: '65ca67e7ae7f10c88b598384'
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            description: Contact name
            type: string
            example: Halyna
          phoneNumber:
            description: Contact phone number
            type: string
            example: '+380991234567'
          email:
            description: Contact email
            type: string
            example: halyna@example.com
          photo:
            description: Contact's avatar
            type: string
            format: binary
          isFavourite:
            description: Is contact favourite
            type: boolean
            example: false
          contactType:
            description: 'Types of contact: work, home and personal'
            type: string
            enum:
              - work
              - home
              - personal
            example: personal
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully updated a contact
            data:
              type: object
              $ref: ../../../components/schemas/contact.yaml
  '401':
    $ref: ../../../components/responses/401.yaml
  '400':
    description: Bad request
    content:
      application/jcon:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: BadRequestError
            data:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: Bad request
                errors:
                  type: array
                  items:
                    type: object
                    required:
                      - message
                      - path
                      - type
                    properties:
                      message:
                        type: string
                        example: '"email" is required'
                      path:
                        type: array
                        items:
                          type: string
                          example: 'email'
                      type:
                        type: string
                        example: any.required
                      context:
                        type: object
                        properties:
                          label:
                            type: string
                            example: name
                          key:
                            type: string
                            example: name