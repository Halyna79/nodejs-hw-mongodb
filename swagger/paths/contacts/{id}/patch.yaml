tags:
  - Contacts
summary: Path contact by id
operationId: updateStatus
description: 'Path contact by id'
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
      example: '6876b478084fefc35976f7b0'
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            description: "Contact's name"
            type: string
            example: 'Halyna'
          phoneNumber:
            description: "Contact's phone number"
            type: string
            example: "+380991234567"
          email:
            description: "Contact's email"
            type: string
            example: halyna@example.com
          isFavourite:
            description: "Contact's is favourite"
            type: boolean
            example: true
          contactType:
            description: "Contact's contact type"
            type: string
            enum: ['work', 'home', 'personal']
          photo:
            description: "Link to contact's photo"
            type: string
            format: binary
responses:
  '200':
    description: 'Patch contact by id'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully update contact with id 6876b478084fefc35976f7b0!
            data:
              type: object
              $ref: '../../../components/schemas/contact.yaml'
  '404':
  $ref: '../../../components/responses/404.yaml'